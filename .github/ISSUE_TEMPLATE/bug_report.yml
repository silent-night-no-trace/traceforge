name: Bug report
description: Report a reproducible problem in Traceforge.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report.

        For Traceforge, the most helpful reports include a minimal reproduction,
        the exact command you ran, and whether a trace bundle or replay report is available.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and why is it a bug?
      placeholder: A short description of the problem.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Provide the smallest sequence of steps or commands that reproduces the issue.
      placeholder: |
        1. Run `traceforge capture -- ...`
        2. Open `traceforge view ...`
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: textarea
    id: trace-artifacts
    attributes:
      label: Trace bundle or artifacts
      description: Link or describe any relevant trace bundle, replay report, screenshots, HTML artifacts, or logs.
      placeholder: Mention `manifest.json`, `events.ndjson`, `replay-report.json`, screenshots, console output, etc.
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Share your OS, Node.js version, package manager, and any adapter-specific context.
      placeholder: |
        - OS:
        - Node.js:
        - pnpm:
        - Traceforge package/version:
        - Source: terminal / MCP / browser
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Anything else that would help triage this issue?
